[changelog]
header = "# Changelog\n\nNewest releases appear first.\n"
body = """
## [{{ version | default(value="Unreleased") | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits -%}
- {{ commit.message | split(pat="\n") | first | trim }}
{% endfor -%}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
filter_commits = true
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "newest"

[[git.commit_parsers]]
message = "^chore: bump"
skip = true

[[git.commit_parsers]]
message = "^chore: release"
skip = true

[[git.commit_parsers]]
message = "^chore(\\([^)]*\\))?:"
skip = true

[[git.commit_parsers]]
message = "^docs(\\([^)]*\\))?:"
skip = true

[[git.commit_parsers]]
message = "^test(\\([^)]*\\))?:"
skip = true

[[git.commit_parsers]]
message = "^refactor(\\([^)]*\\))?:"
skip = true

[[git.commit_parsers]]
message = "^style(\\([^)]*\\))?:"
skip = true

[[git.commit_parsers]]
message = "^ci(\\([^)]*\\))?:"
skip = true

[[git.commit_parsers]]
message = "^build(\\([^)]*\\))?:"
skip = true

[[git.commit_parsers]]
message = "^Merge"
skip = true

# From here: group by conventional prefix if present, else best-effort keyword
# match on the imperative verb, so patch bumps read as "Fixed" and feature
# bumps read as "Added" without requiring strict conventional commits.

[[git.commit_parsers]]
message = "^feat(\\([^)]*\\))?:"
group = "Added"

[[git.commit_parsers]]
message = "^fix(\\([^)]*\\))?:"
group = "Fixed"

[[git.commit_parsers]]
message = "^perf(\\([^)]*\\))?:"
group = "Performance"

[[git.commit_parsers]]
message = "(?i)^(add|adds|adding|introduce|implement)\\b"
group = "Added"

[[git.commit_parsers]]
message = "(?i)^(fix|fixes|fixed|correct)\\b"
group = "Fixed"

[[git.commit_parsers]]
message = "(?i)^(remove|removes|removed|delete|deletes|deleted|drop|drops|dropped)\\b"
group = "Removed"

[[git.commit_parsers]]
message = ".*"
group = "Changed"
